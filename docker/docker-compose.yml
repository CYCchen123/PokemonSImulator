version: '3.9'

# ============================================================
# PokemonSimulator Docker Compose (Web 服务)
#
# 大数据组件（Hadoop/Spark/Kafka/ZooKeeper/Redis）
# 已迁移到物理机集群，通过环境变量连接。
#
# 用法:
#   docker compose up -d
#   docker compose --profile frontend up -d
# ============================================================

services:
  # ============================================================
  # PostgreSQL (运营数据库)
  # ============================================================
  postgres:
    image: postgres:16-alpine
    hostname: postgres
    container_name: pokemon-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: pokemon
      POSTGRES_PASSWORD: pokemon123
      POSTGRES_DB: pokemon_simulator
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init/init-postgres.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - pokemon-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pokemon -d pokemon_simulator"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # 部署在 Node3 上的话，需要修改 ports 绑定地址或使用 Tailscale IP
    # 如果需要从外部访问: 去掉 ports 或改为具体的 Tailscale IP

  # ============================================================
  # Battle Engine (C++ Worker)
  # 通过 subprocess 方式被 Bridge Service 调用
  # ============================================================
  battle-engine:
    build:
      context: ..
      dockerfile: docker/battle-engine/Dockerfile
    hostname: battle-engine
    container_name: pokemon-engine
    environment:
      ENGINE_MODE: daemon
    volumes:
      - engine-cache:/workdir/cache
      - ../data:/data:ro
    networks:
      - pokemon-net
    restart: unless-stopped

  # ============================================================
  # API Server (FastAPI + Kafka Bridge + Redis Client)
  # ============================================================
  api-server:
    build:
      context: ../api-server
      dockerfile: ../docker/api-server/Dockerfile
    hostname: api-server
    container_name: pokemon-api
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      # === 外部物理机集群配置 ===
      # Kafka
      KAFKA_BROKER: "${KAFKA_BROKER:-100.107.105.99:9092,<node2-ip>:9092,<node3-ip>:9092}"
      KAFKA_TOPIC_REQUESTS: battle.requests
      KAFKA_TOPIC_RESULTS: battle.results
      KAFKA_TOPIC_EVENTS: battle.events
      KAFKA_TOPIC_ANALYTICS: battle.analytics
      KAFKA_CONSUMER_GROUP: api-server-group

      # HDFS (WebHDFS)
      HDFS_NAMENODE: "${HDFS_NAMENODE:-100.107.105.99}"
      HDFS_PORT: "${HDFS_PORT:-9870}"
      HDFS_USER: "${HDFS_USER:-root}"
      HDFS_BASE_PATH: /user/pokemon

      # Redis
      REDIS_URL: "${REDIS_URL:-redis://100.107.105.99:6379/0}"
      REDIS_SENTINEL: "${REDIS_SENTINEL:-}"

      # PostgreSQL
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: pokemon
      POSTGRES_PASSWORD: pokemon123
      POSTGRES_DB: pokemon_simulator
      DATABASE_URL: "postgresql://pokemon:pokemon123@postgres:5432/pokemon_simulator"

      # Spark Master
      SPARK_MASTER_URL: "${SPARK_MASTER_URL:-spark://100.107.105.99:7077}"
      SPARK_REST_URL: "${SPARK_REST_URL:-http://100.107.105.99:6066}"

      # Engine
      ENGINE_BINARY: /usr/local/bin/PokemonSimulator
      ENGINE_CACHE_DIR: /tmp/pokemon-engine

      # App
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
      DEBUG: "${DEBUG:-false}"

    volumes:
      - engine-cache:/tmp/pokemon-engine
    networks:
      - pokemon-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ============================================================
  # Nginx (Frontend + Reverse Proxy)
  # ============================================================
  nginx:
    image: nginx:alpine
    hostname: nginx
    container_name: pokemon-nginx
    profiles: ["frontend"]
    depends_on:
      - api-server
    ports:
      - "80:80"
    volumes:
      - ../frontend/dist:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - pokemon-net
    restart: unless-stopped

# ============================================================
# Networks
# ============================================================
networks:
  pokemon-net:
    driver: bridge
    name: pokemon-net

# ============================================================
# Volumes
# ============================================================
volumes:
  postgres-data:
  engine-cache:
