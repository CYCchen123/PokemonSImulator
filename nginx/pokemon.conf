# PokemonSimulator Nginx Site Config
# Install: sudo cp nginx/pokemon.conf /etc/nginx/sites-enabled/
#           sudo sed -i "s|__ROOT__|$(pwd)|g" /etc/nginx/sites-enabled/pokemon.conf
#           sudo nginx -t && sudo systemctl restart nginx

server {
    listen 80;
    server_name localhost;

    location / {
        root __ROOT__/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /ws {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /sprites/ {
        alias __ROOT__/frontend/public/sprites/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location /sprites/types/ {
        alias __ROOT__/frontend/public/sprites/types/;
        expires 30d;
    }
}
