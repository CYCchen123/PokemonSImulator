server {
    listen 80;
    server_name localhost;

    # Frontend static files
    location / {
        root /home/qzz/PokemonSimulator/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # API / WebSocket proxy to gateway
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /ws {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Static sprites
    location /sprites/ {
        alias /home/qzz/PokemonSimulator/frontend/public/sprites/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Type icons
    location /sprites/types/ {
        alias /home/qzz/PokemonSimulator/frontend/public/sprites/types/;
        expires 30d;
    }
}
